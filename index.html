<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pranaya Seserahan</title>
    <style>
        /* Mengatur agar halaman memenuhi seluruh layar browser */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Menghilangkan scrollbar pada body */
            background-color: #ffffff;
        }

        /* Container untuk menampung aplikasi */
        .app-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Pengaturan Iframe agar responsif dan bersih */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxKM4r5AgQAMmiLdb9yKJpxAJT-Ep7_9soY8AiUxH8IxnSv8BJ4ksWUpu-Ph4xNdjd0/exec" 
            allow="geolocation; microphone; camera; encrypted-media;"
            allowfullscreen="true">
        </iframe>
    </div>

</body>

</html>
