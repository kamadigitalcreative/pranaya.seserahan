<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi Web Profesional</title>

    <link rel="icon" type="image/png" href="LOGO.png""> 
    <style>
        /* Menghilangkan margin dan membuat tampilan full screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbz_LUuH6Owcq0h4UVC-zr_N3ilRE-L47i-9uOLYTeOjYg-TIvNSMmMRmhLTxrJIEW1S/exec" 
            allow="geolocation; microphone; camera; encrypted-media;"
            allowfullscreen="true">
        </iframe>
    </div>

</body>
</html>
